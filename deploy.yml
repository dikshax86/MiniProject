---
- name: Deploy Calculator
  hosts: localhost
  become: true

  tasks:

    - name: Pull image
      community.docker.docker_image:
        name: dknights/scientific-calculator
        source: pull

    - name: Remove old container if exists
      community.docker.docker_container:
        name: scientific-calculator
        state: absent
        force_kill: true

    - name: Run container
      community.docker.docker_container:
        name: scientific-calculator
        image: dknights/scientific-calculator
        state: started
        recreate: true
        restart_policy: always